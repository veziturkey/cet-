<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>+CET | منصتي - تحميل تطبيقات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg-gradient-start: #0f0c29;
            --bg-gradient-mid: #1a1a3e;
            --bg-gradient-end: #24243e;
            --card-bg: rgba(255,255,255,0.08);
            --text-primary: white;
            --text-secondary: rgba(255,255,255,0.7);
            --border: rgba(255,255,255,0.1);
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-mid) 50%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            padding: 10px;
        }
        
        /* تحسين للهواتف */
        @media (max-width: 768px) {
            body { padding: 8px; }
            .app-header { padding: 20px 15px 15px !important; }
            .logo h1 { font-size: 24px !important; }
            .search-bar { margin: 12px 15px !important; padding: 10px 15px !important; }
            .search-bar button { padding: 6px 16px !important; font-size: 12px !important; }
            .categories-wrapper { padding: 5px 15px !important; }
            .category-chip { padding: 6px 16px !important; font-size: 11px !important; }
            .apps-container { padding: 12px 15px 60px !important; gap: 12px !important; }
            .app-item { padding: 12px !important; gap: 12px !important; }
            .app-icon { width: 48px !important; height: 48px !important; min-width: 48px !important; }
            .app-icon img { width: 28px !important; height: 28px !important; }
            .app-name { font-size: 14px !important; }
            .app-category { font-size: 10px !important; }
            .download-link { padding: 6px 12px !important; font-size: 11px !important; }
            .details-card { padding: 20px !important; margin: 10px !important; }
            .details-card img { width: 70px !important; height: 70px !important; }
            .details-card h2 { font-size: 18px !important; }
        }
        
        @media (max-width: 480px) {
            .app-name { font-size: 13px !important; }
            .download-link { min-width: 55px; text-align: center; }
        }
        
        /* شاشة الترحيب */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a3e 0%, #0f0c29 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease-out, visibility 0.6s ease-out;
        }
        
        .splash-screen.hide {
            animation: zoomOutForward 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        
        .splash-content { text-align: center; padding: 20px; }
        
        .splash-logo {
            font-size: 56px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #feca57, #ff6b6b);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: slideInFromLeft 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }
        
        .splash-plus {
            font-size: 14px;
            margin-top: 12px;
            color: rgba(255,255,255,0.7);
            letter-spacing: 3px;
            opacity: 0;
            animation: fadeInWithGlitch 0.8s ease-out forwards;
            animation-delay: 0.7s;
        }
        
        .splash-loader {
            width: 3px;
            height: 3px;
            background: linear-gradient(90deg, #feca57, #ff6b6b);
            border-radius: 50%;
            margin: 30px auto 0;
            opacity: 0;
            animation: loaderAppear 0.5s ease-out forwards;
            animation-delay: 1.2s;
        }
        
        @keyframes zoomOutForward {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(2); visibility: hidden; }
        }
        
        @keyframes slideInFromLeft {
            0% { transform: translateX(-100%); opacity: 0; filter: blur(8px); }
            100% { transform: translateX(0); opacity: 1; filter: blur(0); }
        }
        
        @keyframes fadeInWithGlitch {
            0% { opacity: 0; transform: translateX(-30px); letter-spacing: 10px; filter: blur(4px); }
            100% { opacity: 1; transform: translateX(0); letter-spacing: 3px; filter: blur(0); }
        }
        
        @keyframes loaderAppear {
            0% { opacity: 0; width: 3px; }
            100% { opacity: 1; width: 40px; }
        }
        
        .phone-app {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        
        .app-header {
            padding: 20px 20px 15px;
            position: sticky;
            top: 0;
            z-index: 100;
            background: inherit;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
        
        .logo h1 {
            font-size: 28px;
            font-weight: 900;
            text-align: center;
            background: linear-gradient(135deg, #fff, #feca57, #ff6b6b);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .search-bar {
            background: rgba(255,255,255,0.1);
            padding: 10px 16px;
            border-radius: 50px;
            display: flex;
            gap: 8px;
            margin: 12px 20px;
            border: 1px solid var(--border);
        }
        
        .search-bar input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text-primary);
            font-size: 14px;
        }
        
        .search-bar input::placeholder { color: var(--text-secondary); }
        
        .search-bar button {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            border: none;
            padding: 6px 20px;
            border-radius: 50px;
            font-weight: 800;
            cursor: pointer;
            font-size: 13px;
            transition: transform 0.1s ease;
        }
        .search-bar button:active { transform: scale(0.97); }
        
        .categories-wrapper {
            overflow-x: auto;
            white-space: nowrap;
            padding: 5px 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        .categories-list {
            display: inline-flex;
            gap: 10px;
        }
        
        .category-chip {
            background: rgba(255,255,255,0.08);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            display: inline-block;
        }
        
        .category-chip.active {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            color: #1a1a2e;
            transform: scale(1.05);
        }
        
        .apps-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 14px;
            padding: 12px 20px 60px;
        }
        
        @keyframes fadeSlideUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        .app-item {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 14px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            animation: fadeSlideUp 0.4s ease-out backwards;
        }
        
        .app-item:active { transform: scale(0.98); background: rgba(255,255,255,0.12); }
        
        .app-icon {
            width: 52px;
            height: 52px;
            min-width: 52px;
            background: rgba(255,255,255,0.1);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .app-icon img { width: 30px; height: 30px; object-fit: contain; }
        
        .app-details { flex: 1; min-width: 0; }
        .app-name { font-weight: 800; font-size: 14px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .app-category { font-size: 10px; color: var(--text-secondary); margin-top: 3px; }
        
        .download-link {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            padding: 7px 14px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 12px;
            cursor: pointer;
            text-decoration: none;
            color: #1a1a2e;
            white-space: nowrap;
            display: inline-block;
            border: none;
            transition: transform 0.1s ease;
        }
        .download-link:active { transform: scale(0.95); }
        
        .details-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #0f0c29, #1a1a3e);
            z-index: 2000;
            overflow-y: auto;
            display: none;
            padding: 20px;
        }
        
        .details-page.show { display: block; animation: fadeSlideUp 0.3s ease; }
        
        .details-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 25px;
            text-align: center;
            max-width: 450px;
            margin: 20px auto;
        }
        
        .details-card img { width: 80px; height: 80px; border-radius: 20px; margin-bottom: 15px; }
        .details-card h2 { color: white; margin-bottom: 8px; font-size: 20px; }
        .details-card p { color: rgba(255,255,255,0.7); margin: 8px 0; font-size: 14px; line-height: 1.5; }
        
        .back-btn {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 800;
            margin-top: 15px;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.1s ease;
        }
        .back-btn:active { transform: scale(0.97); }
        
        .empty-state, .loading-state { text-align: center; padding: 50px 20px; color: var(--text-secondary); }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2); border-top: 3px solid #feca57; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="splash-screen" id="splashScreen">
    <div class="splash-content">
        <div class="splash-logo">منصتي <span style="background:linear-gradient(135deg,#feca57,#ff6b6b); background-clip:text; -webkit-background-clip:text; -webkit-text-fill-color:transparent;">+CET</span></div>
        <div class="splash-plus">✦ C E T ✦</div>
        <div class="splash-loader"></div>
    </div>
</div>

<div class="phone-app">
    <div class="app-header">
        <div class="logo"><h1>منصتي <span style="color:#feca57;">+CET</span></h1></div>
    </div>
    
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="ابحث عن تطبيق...">
        <button id="searchBtn">بحث</button>
    </div>
    
    <div class="categories-wrapper">
        <div class="categories-list" id="categoriesList"></div>
    </div>
    
    <div class="apps-container" id="appsContainer">
        <div class="loading-state"><div class="loading-spinner"></div>جاري التحميل...</div>
    </div>
</div>

<div id="detailsPage" class="details-page">
    <div class="details-card" id="detailsContent"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDLLJAwLm1kPrfhhoXxP9c2M0LpoGFP2Mg",
        authDomain: "ssssss-33240.firebaseapp.com",
        projectId: "ssssss-33240",
        storageBucket: "ssssss-33240.firebasestorage.app",
        messagingSenderId: "660773546629",
        appId: "1:660773546629:web:e63d6edfd1b7c6d3d497ec"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    let apps = [];
    let categories = [];
    let currentCategory = "all";
    let searchQuery = "";

    function getIconHtml(iconName, size = 30) {
        if (!iconName) iconName = "github";
        return `<img src="https://cdn.jsdelivr.net/npm/simple-icons@v12/icons/${iconName}.svg" width="${size}" height="${size}" style="display:block;" onerror="this.src='https://cdn.jsdelivr.net/npm/simple-icons@v12/icons/github.svg'">`;
    }

    // إخفاء شاشة الترحيب بعد 2.5 ثانية
    setTimeout(() => {
        const splash = document.getElementById("splashScreen");
        if (splash) {
            splash.classList.add("hide");
            setTimeout(() => splash.remove(), 700);
        }
    }, 2500);

    const catsQuery = query(collection(db, "categories"), orderBy("createdAt", "asc"));
    onSnapshot(catsQuery, (snapshot) => {
        categories = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderCategories();
    });

    const appsQuery = query(collection(db, "apps"), orderBy("createdAt", "desc"));
    onSnapshot(appsQuery, (snapshot) => {
        apps = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderApps();
    });

    function renderCategories() {
        const container = document.getElementById("categoriesList");
        let html = `<div class="category-chip ${currentCategory === "all" ? "active" : ""}" data-cat="all">✨ الكل</div>`;
        categories.forEach(cat => {
            html += `<div class="category-chip ${currentCategory === cat.name ? "active" : ""}" data-cat="${cat.name}">${cat.name}</div>`;
        });
        container.innerHTML = html;
        
        document.querySelectorAll(".category-chip").forEach(chip => {
            chip.addEventListener("click", (e) => {
                e.stopPropagation();
                currentCategory = chip.dataset.cat;
                renderCategories();
                renderApps();
            });
        });
    }

    function renderApps() {
        const container = document.getElementById("appsContainer");
        let filtered = apps.filter(app => {
            if (currentCategory !== "all" && app.category !== currentCategory) return false;
            if (searchQuery && !app.name.toLowerCase().includes(searchQuery.toLowerCase())) return false;
            return true;
        });
        
        if (!filtered.length) {
            container.innerHTML = `<div class="empty-state">📭 لا توجد تطبيقات مطابقة</div>`;
            return;
        }
        
        container.innerHTML = filtered.map((app, index) => `
            <div class="app-item" data-id="${app.id}" style="animation-delay: ${index * 0.05}s">
                <div class="app-icon">${getIconHtml(app.icon, 30)}</div>
                <div class="app-details">
                    <div class="app-name">${app.name}</div>
                    <div class="app-category">📂 ${app.category}</div>
                </div>
                <a href="${app.downloadLink && app.downloadLink !== "#" ? app.downloadLink : "javascript:void(0)"}" 
                   class="download-link" 
                   data-id="${app.id}" 
                   data-link="${app.downloadLink}"
                   data-name="${app.name}"
                   target="_blank"
                   rel="noopener noreferrer">تحميل</a>
            </div>
        `).join("");
        
        // تفاصيل البرنامج عند الضغط على البطاقة (وليس الزر)
        document.querySelectorAll(".app-item").forEach(item => {
            const downloadBtn = item.querySelector(".download-link");
            item.addEventListener("click", (e) => {
                // إذا كان الضغط على زر التحميل، لا نفتح التفاصيل
                if (e.target === downloadBtn || downloadBtn.contains(e.target)) {
                    return;
                }
                showDetails(item.dataset.id);
            });
        });
        
        // معالج زر التحميل - يعمل بشكل صحيح على الهواتف
        document.querySelectorAll(".download-link").forEach(btn => {
            btn.addEventListener("click", async (e) => {
                e.preventDefault();
                e.stopPropagation();
                const link = btn.getAttribute("data-link");
                const id = btn.getAttribute("data-id");
                const name = btn.getAttribute("data-name");
                
                if (link && link !== "#" && link !== "javascript:void(0)") {
                    try {
                        // زيادة عداد التحميلات في الخلفية
                        await updateDoc(doc(db, "apps", id), { downloads: increment(1) });
                    } catch(err) { console.error("خطأ في تحديث العداد:", err); }
                    // فتح الرابط
                    window.open(link, "_blank");
                } else {
                    alert(`⚠️ رابط التحميل لـ ${name} غير متوفر بعد`);
                }
                return false;
            });
        });
    }
    
    function showDetails(appId) {
        const app = apps.find(a => a.id === appId);
        if (!app) return;
        
        document.getElementById("detailsContent").innerHTML = `
            ${app.imageUrl ? `<img src="${app.imageUrl}" onerror="this.style.display='none'">` : getIconHtml(app.icon, 80)}
            <h2>${app.name}</h2>
            <p><strong>📂 التصنيف:</strong> ${app.category}</p>
            <p><strong>📝 الوصف:</strong><br>${app.description || "لا يوجد وصف"}</p>
            <button class="back-btn" onclick="closeDetails()">🔙 رجوع</button>
        `;
        document.getElementById("detailsPage").classList.add("show");
    }
    
    window.closeDetails = () => {
        document.getElementById("detailsPage").classList.remove("show");
    };
    
    document.getElementById("searchBtn").addEventListener("click", () => {
        searchQuery = document.getElementById("searchInput").value.trim();
        renderApps();
    });
    
    document.getElementById("searchInput").addEventListener("keyup", (e) => {
        if (e.key === "Enter") {
            searchQuery = document.getElementById("searchInput").value.trim();
            renderApps();
        }
    });
</script>
</body>
</html>
